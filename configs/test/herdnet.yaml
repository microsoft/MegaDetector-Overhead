wandb_project: 'Sample project'
wandb_entity: 'youraccountname'
wandb_run: 'myrun'
device_name: 'cuda'

model: 
  name: 'HerdNet'
  from_torchvision: False
  pth_file: '/home/v-ichaconsil/ssdprivate/PytorchWildlife/HerdNet/weights/20220413_HerdNet_General_dataset_2022.pth'
  kwargs:
    num_layers: 34
    pretrained: False
    down_ratio: 2
    head_conv: 64

dataset:
  img_size: [512,512]
  anno_type: 'point'
  num_classes: 7
  collate_fn: null

  class_def:
    2: 'buffalo'
    6: 'elephant'
    3: 'kob'
    1: 'topi'
    4: 'warthog'
    5: 'waterbuck'

  name: 'CSVDataset'
  csv_file: '/home/v-ichaconsil/ssdprivate/herdnet_general/general_dataset/groundtruth/csv/test_big_size_A_B_E_K_WH_WB_herdnet_format_right_labels.csv'
  root_dir: '/home/v-ichaconsil/ssdprivate/herdnet_general/general_dataset/test'

  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

evaluator:
  name: 'HerdNetEvaluator'
  threshold: 20
  kwargs:
    lmds_kwargs:
      kernel_size: [3,3]
      adapt_ts: 0.3

stitcher:
  name: 'HerdNetStitcher'
  kwargs:
    overlap: 160
    down_ratio: ${test.model.kwargs.down_ratio}
    up: False
    reduction: 'mean'