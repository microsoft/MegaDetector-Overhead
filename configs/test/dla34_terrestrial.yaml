wandb_project: 'herdnet'
wandb_entity: 'idchacon'
wandb_run: 'herdnet_counting_terrestrial_finetuning'
device_name: 'cuda'

model: 
  name: 'SemSegDLA'
  from_torchvision: False
  pth_file: '/home/v-ichaconsil/azurefiles/HerdNet/outputs/2025-06-20/04-47-33/best_model.pth'
  kwargs:
    num_layers: 34
    num_classes: ${test.dataset.num_classes}
    pretrained: False
    down_ratio: 2
    head_conv: 64

dataset:
  img_size: [512,512]
  anno_type: 'point'
  num_classes: 2
  collate_fn: null

  class_def:
    1: 'animal'

  name: 'CSVDataset'
  csv_file: '/home/v-ichaconsil/azurefiles/Aerial_datasets/merged_test_datasets_herdnet_general_han_livestock_quantifying_movement_quantifying_movement_shao_cattle_sheepcounter_and_csv/gt.csv'
  root_dir: '/home/v-ichaconsil/azurefiles/Aerial_datasets/merged_test_datasets_herdnet_general_han_livestock_quantifying_movement_quantifying_movement_shao_cattle_sheepcounter_and_csv'

  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

evaluator:
  name: 'DensityMapEvaluator'
  threshold: 20
  kwargs:
    print_freq: 10
stitcher:
  name: 'DensityMapStitcher'
  kwargs:
    overlap: 160
    adapt_ts: 0.07
    down_ratio: ${test.model.kwargs.down_ratio}
    reduction: 'sum'