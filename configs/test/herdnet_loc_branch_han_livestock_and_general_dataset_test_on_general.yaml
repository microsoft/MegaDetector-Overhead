wandb_project: 'Sample project'
wandb_entity: 'youraccountname'
wandb_run: 'myrun'
device_name: 'cuda'

model: 
  name: 'OWLC'
  from_torchvision: False
  pth_file: '/home/v-ichaconsil/azurefiles/HerdNet/outputs/2025-03-29/02-33-56/best_model.pth'
  kwargs:
    num_layers: 34
    pretrained: False
    down_ratio: 2
    head_conv: 64

dataset:
  img_size: [512,512]
  anno_type: 'point'
  #num_classes: 2 # background and animal
  collate_fn: null

  class_def:
      0: 'background'
      1: 'animal'

  name: 'CSVDataset'
  csv_file: '/home/v-ichaconsil/azurefiles/Aerial_datasets/herdnet_general/general_dataset/groundtruth/csv/test_big_size_A_B_E_K_WH_WB_herdnet_format_right_labels.csv'
  root_dir: '/home/v-ichaconsil/azurefiles/Aerial_datasets/herdnet_general/general_dataset/test'

  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

evaluator:
  name: 'HerdNet_Detection_Branch_Evaluator'
  threshold: 20
  kwargs:
    lmds_kwargs:
      kernel_size: [3,3]
      adapt_ts: 0.3

stitcher:
  name: 'HerdNet_Detection_Branch_Stitcher'
  kwargs:
    overlap: 160
    down_ratio: ${test.model.kwargs.down_ratio}
    up: False
    reduction: 'mean'