wandb_project: 'herdnet' # to change
wandb_entity: 'idchacon' # to change
wandb_run: 'herdnet_counting_terrestrial_finetuning' # to change
seed: 9292
device_name: cuda

model: 
  name: 'SemSegDLA'
  from_torchvision: False
  load_from: '/home/v-ichaconsil/azurefiles/HerdNet/outputs/2025-03-29/02-33-56/best_model.pth'
  partial_load: True # Added for loading only the detection branch weights
  resume_from: '/home/v-ichaconsil/azurefiles/HerdNet/outputs/2025-06-17/17-48-30/latest_model.pth'
  kwargs:
    num_layers: 34
    num_classes: ${train.datasets.num_classes}
    pretrained: True
    down_ratio: 2
    head_conv: 64

losses:
  SSIMLoss:
    print_name: 'ssim_loss'
    from_torch: False
    output_idx: 0
    target_idx: 0
    lambda_const: 1.0
    kwargs:
      reduction: 'mean'

datasets:
  img_size: [512,512]
  anno_type: 'point'
  num_classes: 2
  collate_fn: null

  class_def:
    1: 'animal'
  
  train:
    name: FolderDataset
    csv_file: '/home/v-ichaconsil/azurefiles/Aerial_datasets/merged_training_patches_herdnet_general_han_livestock_quantifying_movement_quantifying_movement_shao_cattle_sheepcounter_and_csv/gt.csv'
    root_dir: '/home/v-ichaconsil/azurefiles/Aerial_datasets/merged_training_patches_herdnet_general_han_livestock_quantifying_movement_quantifying_movement_shao_cattle_sheepcounter_and_csv'
    
    sampler: null

    albu_transforms:
      VerticalFlip:
        p: 0.5
      HorizontalFlip:
        p: 0.5
      RandomRotate90:
        p: 0.5
      RandomBrightnessContrast:
        brightness_limit: 0.2
        contrast_limit: 0.2
        p: 0.2
      Blur:
        blur_limit: 15
        p: 0.2
      Normalize:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
    
    end_transforms:
      GaussianMap:
        sigma: 5
        radius: 1
        num_classes: ${train.datasets.num_classes}
        down_ratio: ${train.model.kwargs.down_ratio}

  validate:
    name: CSVDataset
    csv_file: '/home/v-ichaconsil/azurefiles/Aerial_datasets/merged_test_datasets_herdnet_general_han_livestock_quantifying_movement_quantifying_movement_shao_cattle_sheepcounter_and_csv/gt.csv'
    root_dir: '/home/v-ichaconsil/azurefiles/Aerial_datasets/merged_test_datasets_herdnet_general_han_livestock_quantifying_movement_quantifying_movement_shao_cattle_sheepcounter_and_csv'

    albu_transforms:
      Normalize:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
    
    end_transforms:
      DownSample:
        down_ratio: ${train.model.kwargs.down_ratio}
        anno_type: ${train.datasets.anno_type}

training_settings:
  trainer: 'Trainer'
  valid_freq: 1
  print_freq: 100
  batch_size: 32
  optimizer: 'adam'
  lr: 1e-5
  weight_decay: 0.0005
  auto_lr: False
  warmup_iters: 100
  epochs: 100
  vizual_fn: null
  evaluator:
    name: 'DensityMapEvaluator'
    threshold: 10
    select_mode: 'min'
    validate_on: 'rmse'
    kwargs:
      print_freq: 10
  stitcher:
    name: 'DensityMapStitcher'
    kwargs:
      overlap: 0
      down_ratio: ${train.model.kwargs.down_ratio}
      reduction: 'sum'