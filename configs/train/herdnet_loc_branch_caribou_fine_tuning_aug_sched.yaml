# 2026-04-25: variant of herdnet_loc_branch_caribou_fine_tuning_aug.yaml that
# also tunes the optimizer schedule and the focal-loss normalization.
#
# Changes vs the AUG config:
#   - warmup_iters: 1 -> 100
#       1 iteration of warmup is effectively no warmup. 100 iters provides a
#       genuine ramp before reaching peak LR; cheap insurance.
#   - auto_lr.patience: 10 -> 3
#   - auto_lr.cooldown: 10 -> 3
#       With epochs=20, patience/cooldown of 10 means the scheduler can fire
#       at most once mid-training. Tightening to 3 lets the scheduler actually
#       react to plateaus inside the budget.
#   - FocalLoss.kwargs.normalize: false -> true
#       The original config had a TODO next to this. Most HerdNet configs
#       default to normalize=true; an unnormalized focal loss has gradient
#       magnitude proportional to the (uneven) per-batch positive count,
#       making convergence noisier. normalize=true divides by num_positives.
#
# Augmentation pipeline is identical to the _aug variant. Validation set still
# uses FolderDataset (background-patches participate in metrics).
wandb_project: 'herdnet'
wandb_entity: 'idchacon'
wandb_run: 'herdnet_caribou_finetuning_aug_sched'
seed: 9292
device_name: cuda

model:
  name: OWLC
  from_torchvision: False
  load_from: '/home/v-ichaconsil/azurefiles/HerdNet/outputs/2025-04-25/03-46-42/best_model.pth'
  partial_load: False
  resume_from: null
  kwargs:
    num_layers: 34
    pretrained: true
    down_ratio: 2
    head_conv: 64
  freeze: null
losses:
  FocalLoss:
    print_name: focal_loss
    from_torch: false
    output_idx: 0
    target_idx: 0
    lambda_const: 1.0
    kwargs:
      reduction: mean
      normalize: true
datasets:
  img_size: [512, 512]
  anno_type: point
  collate_fn: null

  class_def:
    1: 'animal'
  train:
    name: FolderDataset
    csv_file: '/home/v-ichaconsil/azurefiles/Aerial_datasets/Caribou/Caribou_train_patches_and_csv/gt.csv'
    root_dir: '/home/v-ichaconsil/azurefiles/Aerial_datasets/Caribou/Caribou_train_patches_and_csv'
    sampler: null
    albu_transforms:
      VerticalFlip:
        p: 0.5
      HorizontalFlip:
        p: 0.5
      RandomRotate90:
        p: 0.5
      RandomBrightnessContrast:
        brightness_limit: 0.2
        contrast_limit: 0.2
        p: 0.5
      MotionBlur:
        blur_limit: 5
        p: 0.2
      GaussNoise:
        var_limit: [10.0, 50.0]
        p: 0.3
      HueSaturationValue:
        hue_shift_limit: 10
        sat_shift_limit: 20
        val_shift_limit: 10
        p: 0.3
      Normalize:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
    end_transforms:
      FIDT:
        add_bg: false
        down_ratio: ${train.model.kwargs.down_ratio}
  validate:
    name: FolderDataset
    csv_file: '/home/v-ichaconsil/azurefiles/Aerial_datasets/Caribou/Caribou_test_patches_and_csv/gt.csv'
    root_dir: '/home/v-ichaconsil/azurefiles/Aerial_datasets/Caribou/Caribou_test_patches_and_csv'
    albu_transforms:
      Normalize:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
    end_transforms:
      DownSample:
        down_ratio: ${train.model.kwargs.down_ratio}
        anno_type: ${train.datasets.anno_type}
training_settings:
  valid_freq: 1
  trainer: Trainer
  print_freq: 100
  batch_size: 32
  optimizer: adam
  lr: 1.0e-05
  weight_decay: 0.0005
  auto_lr:
    mode: max
    patience: 3
    threshold: 0.0001
    threshold_mode: rel
    cooldown: 3
    min_lr: 1.0e-06
    verbose: true
  warmup_iters: 100
  vizual_fn: null
  epochs: 20
  evaluator:
    name: HerdNet_Detection_Branch_Evaluator
    threshold: 10
    select_mode: max
    validate_on: f1_score
    kwargs:
      print_freq: 10
      lmds_kwargs:
        kernel_size: [3,3]
        adapt_ts: 0.3
  stitcher:
    name: HerdNet_Detection_Branch_Stitcher
    kwargs:
      overlap: 160
      down_ratio: ${train.model.kwargs.down_ratio}
      up: false
      reduction: mean
