# 2026-04-25: variant of herdnet_loc_branch_caribou_fine_tuning_aug.yaml that
# tests a larger learning rate.
#
# Change vs the AUG config:
#   - lr: 1.0e-05 -> 5.0e-05
#       The bug-fix recovered ~13% more train annotations and added ~3,800
#       empty-TIF backgrounds the model has never seen. The previous lr=1e-5
#       was tuned for a smaller, less-diverse dataset; with substantially more
#       supervision, a 5x bump may help the model adapt faster within the
#       20-epoch budget. Still well within fine-tuning territory (cf. typical
#       HerdNet caribou configs at 1e-4).
#       If 5e-5 is too aggressive, the pretrained checkpoint might lose useful
#       features in early epochs; the validate_on=f1_score select_mode=max
#       ensures we keep the best checkpoint regardless.
#
# Augmentation pipeline is identical to the _aug variant. Validation uses
# FolderDataset.
wandb_project: 'herdnet'
wandb_entity: 'idchacon'
wandb_run: 'herdnet_caribou_finetuning_aug_lr'
seed: 9292
device_name: cuda

model:
  name: OWLC
  from_torchvision: False
  load_from: '/home/v-ichaconsil/azurefiles/HerdNet/outputs/2025-04-25/03-46-42/best_model.pth'
  partial_load: False
  resume_from: null
  kwargs:
    num_layers: 34
    pretrained: true
    down_ratio: 2
    head_conv: 64
  freeze: null
losses:
  FocalLoss:
    print_name: focal_loss
    from_torch: false
    output_idx: 0
    target_idx: 0
    lambda_const: 1.0
    kwargs:
      reduction: mean
      normalize: false
datasets:
  img_size: [512, 512]
  anno_type: point
  collate_fn: null

  class_def:
    1: 'animal'
  train:
    name: FolderDataset
    csv_file: '/home/v-ichaconsil/azurefiles/Aerial_datasets/Caribou/Caribou_train_patches_and_csv/gt.csv'
    root_dir: '/home/v-ichaconsil/azurefiles/Aerial_datasets/Caribou/Caribou_train_patches_and_csv'
    sampler: null
    albu_transforms:
      VerticalFlip:
        p: 0.5
      HorizontalFlip:
        p: 0.5
      RandomRotate90:
        p: 0.5
      RandomBrightnessContrast:
        brightness_limit: 0.2
        contrast_limit: 0.2
        p: 0.5
      MotionBlur:
        blur_limit: 5
        p: 0.2
      GaussNoise:
        var_limit: [10.0, 50.0]
        p: 0.3
      HueSaturationValue:
        hue_shift_limit: 10
        sat_shift_limit: 20
        val_shift_limit: 10
        p: 0.3
      Normalize:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
    end_transforms:
      FIDT:
        add_bg: false
        down_ratio: ${train.model.kwargs.down_ratio}
  validate:
    name: FolderDataset
    csv_file: '/home/v-ichaconsil/azurefiles/Aerial_datasets/Caribou/Caribou_test_patches_and_csv/gt.csv'
    root_dir: '/home/v-ichaconsil/azurefiles/Aerial_datasets/Caribou/Caribou_test_patches_and_csv'
    albu_transforms:
      Normalize:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
    end_transforms:
      DownSample:
        down_ratio: ${train.model.kwargs.down_ratio}
        anno_type: ${train.datasets.anno_type}
training_settings:
  valid_freq: 1
  trainer: Trainer
  print_freq: 100
  batch_size: 32
  optimizer: adam
  lr: 5.0e-05
  weight_decay: 0.0005
  auto_lr:
    mode: max
    patience: 10
    threshold: 0.0001
    threshold_mode: rel
    cooldown: 10
    min_lr: 1.0e-06
    verbose: true
  warmup_iters: 1
  vizual_fn: null
  epochs: 20
  evaluator:
    name: HerdNet_Detection_Branch_Evaluator
    threshold: 10
    select_mode: max
    validate_on: f1_score
    kwargs:
      print_freq: 10
      lmds_kwargs:
        kernel_size: [3,3]
        adapt_ts: 0.3
  stitcher:
    name: HerdNet_Detection_Branch_Stitcher
    kwargs:
      overlap: 160
      down_ratio: ${train.model.kwargs.down_ratio}
      up: false
      reduction: mean
